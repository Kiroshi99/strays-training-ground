<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Number Guessing Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Number Guessing Game</h1>
  <div id="timerBarContainer">
    <div id="timerBar"></div> <!-- Visual timer bar -->
  </div>
  <div id="inputs">
    <input type="text" id="input1" maxlength="1" oninput="moveFocus(1, 2)">
    <input type="text" id="input2" maxlength="1" oninput="moveFocus(2, 3)">
    <input type="text" id="input3" maxlength="1" oninput="moveFocus(3, 4)">
    <input type="text" id="input4" maxlength="1" oninput="moveFocus(4)">
  </div>
  <button id="restartButton" onclick="restartGame()" style="display:none;">Restart Game</button>
  <script src="script.js"></script>
</body>
</html>
