<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Shape Sequence</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="panel" id="gamePanel" data-level="1">

    <div class="target-box">
      <span class="label">FIND TARGET:</span>
      <div id="targetDisplay" class="target-display"></div>
    </div>

    <div class="level-settings">
      <button class="level-btn active" type="button" data-level="1">
        LEVEL 1
      </button>

      <button class="level-btn" type="button" data-level="2">
        LEVEL 2
      </button>

      <button class="level-btn" type="button" data-level="3">
        LEVEL 3
      </button>
    </div>

    <p id="levelInfo" class="level-info">
      LEVEL 1 — 3 BOXES · 8 × 8 GRID
    </p>

    <div id="grid" class="grid"></div>

    <div id="message" class="message">
      Choose a level and game time, then press START.
    </div>

    <div class="timer-area">
      <div class="timer-bar">
        <div id="timerFill" class="timer-fill"></div>
      </div>

      <div class="timer-text">
        Time: <span id="timerText">30.0s</span>
      </div>
    </div>

    <div class="success-box">
      Success: <span id="successCount">0</span>
    </div>

    <div class="controls">
      <label for="gameTime">GAME TIME</label>

      <input
        id="gameTime"
        type="number"
        value="30"
        min="5"
        max="300"
      />

      <button id="startBtn" type="button">
        START
      </button>
    </div>

    <p class="instructions">
      <b>W A S D</b> or <b>Arrow Keys</b> moves the
      <span id="selectionCount">3</span> blue boxes.<br />
      <b>SPACE</b> or <b>ENTER</b> confirms the selected sequence.
    </p>

  </main>

  <script src="script.js"></script>
</body>
</html>
