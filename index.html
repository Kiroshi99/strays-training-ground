<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Follow the Moving Circle</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="game-wrapper">

    <div id="top-bar">
      <div id="title">FOLLOW THE SIGNAL</div>
      <div id="timer">Time: 0.0s</div>
    </div>

    <div id="instruction">
      Keep your cursor inside the neon orb. Do not leave the signal radius.
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="status">
      <span id="status-light"></span>
      SIGNAL LOCK READY
    </div>

    <div id="game-over-screen">
      <h1>TRACE LOST</h1>
      <p id="final-time">You survived for 0.0 seconds.</p>
      <button onclick="restartGame()">RETRY</button>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
